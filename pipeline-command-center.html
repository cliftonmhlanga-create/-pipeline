<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline · Clifton Mhlanga</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap');
  :root{
    --bg:#f5f5f7; --surface:#ffffff; --surface-2:#fbfbfd; --fill:#f0f0f3; --fill-2:#e8e8ed;
    --text:#1d1d1f; --text-2:#6e6e73; --text-3:#8e8e93;
    --hair:rgba(0,0,0,.07); --hair-2:rgba(0,0,0,.12);
    --accent:#0071e3; --accent-soft:rgba(0,113,227,.1);
    --green:#30b14a; --green-soft:rgba(48,177,74,.12); --green-deep:#1f7d33;
    --blue:#0071e3;  --blue-soft:rgba(0,113,227,.1);
    --indigo:#5e5ce6; --indigo-soft:rgba(94,92,230,.1);
    --orange:#f08400; --orange-soft:rgba(240,132,0,.12);
    --gray:#8e8e93;  --gray-soft:rgba(142,142,147,.14);
    --red:#e0352b;   --red-soft:rgba(224,53,43,.1);
    --shadow-s:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.05);
    --shadow-m:0 4px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
    --shadow-l:0 12px 48px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
    --r-s:9px; --r-m:13px; --r-l:18px; --r-xl:24px;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:'cv01','cv03','ss01'}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.16);border-radius:10px;border:3px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.28);background-clip:content-box}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:50;background:rgba(245,245,247,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hair)}
  .topbar-inner{max-width:1120px;margin:0 auto;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand-mark{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:linear-gradient(140deg,#1d1d1f,#3a3a3c);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;letter-spacing:-.5px}
  .brand-name{font-size:15px;font-weight:600;letter-spacing:-.2px;white-space:nowrap}
  .brand-name span{color:var(--text-3);font-weight:500}
  .sync-badge{font-size:11px;font-weight:650;letter-spacing:.2px;white-space:nowrap}
  .seg{display:flex;background:var(--fill-2);border-radius:9px;padding:2px;gap:2px}
  .seg button{font-size:13px;font-weight:550;color:var(--text-2);padding:5px 15px;border-radius:7px;transition:.2s var(--ease);white-space:nowrap}
  .seg button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-s);font-weight:600}
  .seg button:not(.active):hover{color:var(--text)}
  .topbar-actions{display:flex;align-items:center;gap:7px}
  .btn{font-size:13px;font-weight:550;padding:7px 12px;border-radius:8px;transition:.18s var(--ease);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn-ghost{color:var(--text-2)}
  .btn-ghost:hover{background:var(--fill);color:var(--text)}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(0,113,227,.3)}
  .btn-primary:hover{background:#0062c4}
  .btn svg{width:15px;height:15px}
  .cur-btn{font-size:12px;font-weight:650;color:var(--text-2);background:var(--fill);padding:6px 11px;border-radius:8px;transition:.15s var(--ease)}
  .cur-btn:hover{background:var(--fill-2);color:var(--text)}
  .ro-banner{display:none;background:#1d1d1f;color:#fff;text-align:center;font-size:12.5px;font-weight:550;padding:7px;letter-spacing:.2px}
  .ro-banner b{font-weight:700}

  .page{max-width:1120px;margin:0 auto;padding:30px 28px 96px}
  .view{display:none}
  .view.active{display:block;animation:fade .4s var(--ease)}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .page-head{margin-bottom:20px}
  .page-title{font-size:30px;font-weight:750;letter-spacing:-.6px;line-height:1.1}
  .page-sub{font-size:14px;color:var(--text-2);margin-top:4px}

  /* summary card */
  .summary{background:var(--surface);border-radius:var(--r-l);box-shadow:var(--shadow-s);border:1px solid var(--hair);padding:22px 24px;margin-bottom:18px}
  .sum-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .sum-title{font-size:15px;font-weight:650;letter-spacing:-.2px}
  .sum-target{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:550;color:var(--text-2)}
  .sum-target .cur{color:var(--text-3)}
  .sum-target input{width:96px;background:var(--fill);border:1px solid transparent;border-radius:8px;padding:5px 9px;font-size:13px;font-weight:650;outline:none;text-align:right}
  .sum-target input:focus{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
  .sum-cell{padding:0 20px;border-right:1px solid var(--hair)}
  .sum-cell:first-child{padding-left:0}
  .sum-cell:last-child{border-right:none}
  .sum-label{font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-3)}
  .sum-value{font-size:24px;font-weight:750;letter-spacing:-.8px;margin-top:6px;line-height:1.05}
  .sum-value.accent{color:var(--accent)}.sum-value.green{color:var(--green)}
  .sum-sub{font-size:12px;color:var(--text-3);font-weight:600;margin-top:3px}
  .sum-meta{font-size:12px;color:var(--text-2);margin-top:4px;font-weight:500}
  .sum-cov{margin-top:20px;padding-top:18px;border-top:1px solid var(--hair)}
  .cov-track{height:10px;border-radius:6px;background:var(--fill);overflow:hidden;display:flex}
  .cov-seg{height:100%;transition:width .7s var(--ease)}
  .cov-label{font-size:12.5px;color:var(--text-2);margin-top:10px;font-weight:500;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .cov-label b{color:var(--text);font-weight:700}
  .cov-key{display:inline-flex;align-items:center;gap:5px}
  .cov-key .d{width:8px;height:8px;border-radius:3px}

  /* focus strip */
  .focus{background:linear-gradient(135deg,#1d1d1f,#2b2b2e);border-radius:var(--r-l);padding:18px 22px;margin-bottom:18px;color:#fff;box-shadow:var(--shadow-m);position:relative;overflow:hidden}
  .focus::after{content:'';position:absolute;top:-40%;right:-8%;width:280px;height:280px;background:radial-gradient(circle,rgba(0,113,227,.22),transparent 70%);pointer-events:none}
  .focus-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:650;letter-spacing:.4px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:14px;position:relative}
  .focus-head svg{width:14px;height:14px}
  .focus-items{display:flex;flex-direction:column;gap:2px;position:relative}
  .focus-item{display:flex;align-items:center;gap:13px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s var(--ease)}
  .focus-item:hover{background:rgba(255,255,255,.07)}
  .focus-icn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .focus-icn svg{width:15px;height:15px}
  .focus-txt{flex:1;min-width:0}
  .focus-txt .ft1{font-size:14px;font-weight:600;letter-spacing:-.2px}
  .focus-txt .ft2{font-size:12px;color:rgba(255,255,255,.5);margin-top:1px}
  .focus-when{font-size:12px;font-weight:600;color:rgba(255,255,255,.75);white-space:nowrap}

  /* quarter filter chips */
  .qfilter{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px}
  .qchip{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:100px;background:var(--surface);border:1px solid var(--hair);box-shadow:var(--shadow-s);font-size:13px;font-weight:600;color:var(--text-2);white-space:nowrap;transition:.15s var(--ease)}
  .qchip:hover{border-color:var(--hair-2)}
  .qchip.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
  .qchip .qc-count{font-size:11px;font-weight:700;color:var(--text-3);background:var(--fill);padding:1px 7px;border-radius:20px}
  .qchip.active .qc-count{color:rgba(255,255,255,.7);background:rgba(255,255,255,.16)}
  .qchip .now-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .qchip.active .now-dot{background:#5ea8ff}

  /* deal groups + cards */
  .group{margin-bottom:24px}
  .group-head{display:flex;align-items:center;gap:10px;padding:0 4px 12px}
  .group-dot{width:8px;height:8px;border-radius:50%}
  .group-name{font-size:13px;font-weight:650;letter-spacing:-.1px}
  .group-count{font-size:12px;color:var(--text-3);font-weight:550;background:var(--fill);padding:1px 8px;border-radius:20px}
  .group-sum{margin-left:auto;font-size:13px;font-weight:600;color:var(--text-2);letter-spacing:-.2px}
  .card-stack{display:flex;flex-direction:column;gap:10px}

  .deal-card{background:var(--surface);border-radius:var(--r-m);box-shadow:var(--shadow-s);border:1px solid var(--hair);padding:16px 18px;cursor:pointer;transition:transform .18s var(--ease),box-shadow .18s var(--ease)}
  .deal-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-m)}
  .deal-card:active{transform:translateY(0)}
  .dc-top{display:flex;align-items:flex-start;gap:12px}
  .dc-status{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:6px}
  .dc-id{flex:1;min-width:0}
  .dc-name{font-size:15.5px;font-weight:650;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dc-attn{display:inline-flex;align-items:center;color:var(--orange);flex-shrink:0}
  .dc-attn svg{width:14px;height:14px}
  .qtag{font-size:10px;font-weight:700;letter-spacing:.2px;padding:2px 7px;border-radius:6px;background:var(--fill);color:var(--text-2);flex-shrink:0}
  .qtag.now{background:var(--accent-soft);color:var(--accent)}
  .dc-meta{font-size:12.5px;color:var(--text-3);margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dc-money{text-align:right;flex-shrink:0}
  .dc-arr{font-size:16px;font-weight:750;letter-spacing:-.5px;white-space:nowrap}
  .dc-arr2{font-size:11.5px;color:var(--text-3);font-weight:600;margin-top:1px;white-space:nowrap}
  .dc-stage{margin-top:13px}
  .stage-bar{display:flex;gap:3px}
  .stage-seg{height:5px;border-radius:3px;flex:1;background:var(--fill-2);transition:background .3s var(--ease)}
  .dc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;gap:10px}
  .dc-stage-label{font-size:12px;font-weight:600;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dc-foot-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .dc-next{font-size:12.5px;color:var(--text-2);font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .dc-next svg{width:13px;height:13px;opacity:.55}
  .dc-next.soon{color:var(--orange);font-weight:600}
  .dc-age{font-size:11.5px;color:var(--text-3);font-weight:550;white-space:nowrap}
  .dc-age.stale{color:var(--orange);font-weight:650}
  .trend{display:inline-flex;align-items:center;font-size:11px;font-weight:700;gap:1px}
  .trend svg{width:12px;height:12px}
  .trend.up{color:var(--green)}.trend.down{color:var(--red)}.trend.flat{color:var(--text-3)}
  .ring-wrap{position:relative;flex-shrink:0}
  .ring-wrap .ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:-.3px}

  .winrate{background:var(--surface);border-radius:var(--r-l);box-shadow:var(--shadow-s);border:1px solid var(--hair);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
  .wr-big{font-size:30px;font-weight:780;letter-spacing:-1px;color:var(--green)}
  .wr-cell .wl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3)}
  .wr-cell .wv{font-size:17px;font-weight:700;margin-top:3px}

  /* agenda */
  .agenda-month{margin-bottom:8px}
  .agenda-month-head{font-size:12px;font-weight:650;letter-spacing:.3px;text-transform:uppercase;color:var(--text-3);padding:18px 4px 10px;position:sticky;top:56px;background:var(--bg);z-index:5}
  .agenda-card{background:var(--surface);border-radius:var(--r-l);box-shadow:var(--shadow-s);border:1px solid var(--hair);overflow:hidden}
  .agenda-item{display:flex;align-items:center;gap:16px;padding:14px 18px;border-bottom:1px solid var(--hair);cursor:pointer;transition:background .15s var(--ease)}
  .agenda-item:last-child{border-bottom:none}
  .agenda-item:hover{background:var(--surface-2)}
  .agenda-date{display:flex;flex-direction:column;align-items:center;justify-content:center;width:50px;height:50px;border-radius:12px;background:var(--fill);flex-shrink:0}
  .agenda-date.soon{background:var(--orange-soft)}
  .agenda-date .d{font-size:18px;font-weight:750;line-height:1;letter-spacing:-.5px}
  .agenda-date.soon .d{color:var(--orange)}
  .agenda-date .m{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text-3);margin-top:3px}
  .agenda-body{flex:1;min-width:0}
  .agenda-label{font-size:14.5px;font-weight:600;letter-spacing:-.2px}
  .agenda-meta{font-size:12.5px;color:var(--text-2);margin-top:3px;display:flex;align-items:center;gap:7px}
  .agenda-meta .dot{width:7px;height:7px;border-radius:50%}
  .agenda-arr{font-size:14px;font-weight:650;color:var(--text-2);white-space:nowrap;letter-spacing:-.3px}

  /* forecast */
  .scen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
  .scen{background:var(--surface);border-radius:var(--r-l);box-shadow:var(--shadow-s);border:1px solid var(--hair);padding:24px;position:relative;overflow:hidden}
  .scen::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .scen.commit::before{background:var(--green)}.scen.best::before{background:var(--accent)}.scen.pipe::before{background:var(--gray)}
  .scen-label{font-size:12px;font-weight:650;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3)}
  .scen-value{font-size:31px;font-weight:780;letter-spacing:-1.2px;margin:8px 0 2px}
  .scen.commit .scen-value{color:var(--green)}.scen.best .scen-value{color:var(--accent)}
  .scen-sub2{font-size:13px;color:var(--text-3);font-weight:650;margin-bottom:6px}
  .scen-note{font-size:12.5px;color:var(--text-2);line-height:1.5}
  .breakdown,.belowbar{background:var(--surface);border-radius:var(--r-l);box-shadow:var(--shadow-s);border:1px solid var(--hair);padding:24px 26px;margin-bottom:18px}
  .breakdown h3,.belowbar h3{font-size:15px;font-weight:650;letter-spacing:-.2px;margin-bottom:6px}
  .belowbar .sub,.breakdown .sub{font-size:12.5px;color:var(--text-2);margin-bottom:18px}
  .bd-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .bd-row:last-child{margin-bottom:0}
  .bd-name{font-size:13px;font-weight:600;width:96px;display:flex;align-items:center;gap:8px}
  .bd-name .dot{width:8px;height:8px;border-radius:50%}
  .bd-track{flex:1;height:8px;background:var(--fill);border-radius:5px;overflow:hidden}
  .bd-fill{height:100%;border-radius:5px;transition:width .7s var(--ease)}
  .bd-val{font-size:13px;font-weight:650;width:96px;text-align:right;letter-spacing:-.3px}
  .below-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hair);cursor:pointer}
  .below-item:last-child{border-bottom:none}
  .below-item:hover{opacity:.7}
  .below-item .bi-name{font-size:14px;font-weight:600;flex:1}
  .below-item .bi-why{font-size:12.5px;color:var(--orange);font-weight:550}
  .below-item .bi-arr{font-size:13.5px;font-weight:650;color:var(--text-2);width:96px;text-align:right}

  /* slide-over */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .35s var(--ease);z-index:80}
  .scrim.open{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;height:100%;width:min(560px,100%);background:var(--surface);box-shadow:var(--shadow-l);z-index:90;transform:translateX(100%);transition:transform .42s var(--ease);display:flex;flex-direction:column}
  .panel.open{transform:none}
  .panel-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--hair);flex-shrink:0;background:rgba(255,255,255,.8);backdrop-filter:blur(12px)}
  .icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:.15s var(--ease)}
  .icon-btn:hover{background:var(--fill);color:var(--text)}
  .icon-btn svg{width:18px;height:18px}
  .icon-btn.danger:hover{background:var(--red-soft);color:var(--red)}
  .status-select{position:relative;margin-left:auto}
  .status-pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.15s var(--ease)}
  .status-pill .dot{width:8px;height:8px;border-radius:50%}
  .status-pill svg{width:14px;height:14px;opacity:.6}
  .status-pill:hover{filter:brightness(.97)}
  .status-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border-radius:var(--r-m);box-shadow:var(--shadow-l);border:1px solid var(--hair);padding:5px;min-width:170px;opacity:0;transform:translateY(-6px) scale(.97);pointer-events:none;transition:.18s var(--ease);z-index:5}
  .status-menu.open{opacity:1;transform:none;pointer-events:auto}
  .status-opt{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:550;padding:8px 10px;border-radius:8px;cursor:pointer;width:100%;text-align:left}
  .status-opt:hover{background:var(--fill)}
  .status-opt .dot{width:8px;height:8px;border-radius:50%}
  .panel-body{flex:1;overflow-y:auto;padding:24px 26px 80px}
  .panel-name{font-size:25px;font-weight:750;letter-spacing:-.6px;width:100%;border:none;background:none;outline:none;padding:2px 0;margin-bottom:14px}
  .panel-name::placeholder{color:var(--text-3)}
  .panel-name:disabled{opacity:1}
  .hero-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:center;padding:18px 20px;background:var(--surface-2);border:1px solid var(--hair);border-radius:var(--r-m);margin-bottom:24px}
  .hero-cell .hk{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3)}
  .hero-arr-row{display:flex;align-items:center;gap:6px;margin-top:5px}
  .hero-arr-input{font-size:23px;font-weight:750;letter-spacing:-.8px;border:none;background:none;outline:none;width:100%;padding:0}
  .cur-select{font-size:12px;font-weight:650;color:var(--text-2);background:var(--fill);border:none;border-radius:7px;padding:4px 6px;outline:none;cursor:pointer}
  .hero-aud{font-size:11.5px;color:var(--text-3);font-weight:500;margin-top:3px}
  .hero-date{font-size:15px;font-weight:600;margin-top:6px;letter-spacing:-.2px}
  .hero-health{text-align:center}
  .hero-health .ring-wrap{margin:4px auto 0}
  .hero-health .ring-num{font-size:16px}

  .sec{margin-bottom:26px}
  .sec-title{font-size:12px;font-weight:650;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

function loadState(){
  let raw=null;
  try{ const h=new URLSearchParams(location.hash.slice(1)); if(h.get('d')) raw=JSON.parse(decodeURIComponent(escape(atob(h.get('d'))))); if(h.get('m')==='1')RO=true; }catch(e){}
  if(!raw){ try{ const s=localStorage.getItem(KEY); if(s) raw=JSON.parse(s); }catch(e){} }
  if(!raw) raw=JSON.parse(JSON.stringify({deals:SEED,meta:{target:250000,displayMode:'both'}}));
  if(Array.isArray(raw)) raw={deals:raw,meta:{target:250000,displayMode:'both'}};
  deals=raw.deals||[]; meta=raw.meta||{target:250000,displayMode:'both'};
  if(!meta.displayMode) meta.displayMode='both'; if(meta.target==null) meta.target=250000;
  migrate();
}
function migrate(){
  deals.forEach(d=>{
    if(!Array.isArray(d.proof)) d.proof=proofFrom(0);
    if(d.belief==null) d.belief=5; if(d.deserve==null) d.deserve=5;
    if(!d.cur) d.cur='AUD'; if(!d.snapshots) d.snapshots=[];
    if(!Array.isArray(d.journey)) d.journey=journeyTo(0);
    if(!Array.isArray(d.people)) d.people=[];
    if(d.whyNow==null) d.whyNow=''; if(d.costInaction==null) d.costInaction=''; if(d.threats==null) d.threats='';
    if(d.closeDate==null) d.closeDate='';
    if(!d.closeDate){ const s=SEED.find(x=>x.id===d.id); if(s&&s.closeDate) d.closeDate=s.closeDate; } // backfill for data saved before close dates existed
    if(!Array.isArray(d.comments)) d.comments=[];
  });
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify({deals,meta})); }catch(e){} pushRemote(); }

/* ── live sync (Firebase, optional) ── */
let syncReady=false, syncDoc=null, applyingRemote=false, saveTimer=null;
function initSync(){
  if(!FIREBASE_CONFIG || !window.firebase){ updateSyncBadge(false); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    syncDoc=firebase.firestore().collection('pipeline').doc(SYNC_DOC_ID);
    syncDoc.onSnapshot(snap=>{
      if(!snap.exists){ pushRemote(true); return; }
      const data=snap.data(); if(!data||!data.payload) return;
      try{
        const parsed=JSON.parse(data.payload);
        applyingRemote=true;
        deals=parsed.deals||deals;
        if(parsed.meta) meta=Object.assign({},meta,parsed.meta);
        migrate();
        try{ localStorage.setItem(KEY,JSON.stringify({deals,meta})); }catch(e){}
        const a=document.activeElement, typing=a&&$('#panel').contains(a);
        applyChrome(); renderActive(); if(openId&&!typing) renderPanel();
        applyingRemote=false;
      }catch(e){ applyingRemote=false; }
    }, err=>{ updateSyncBadge(false); });
    syncReady=true; updateSyncBadge(true);
  }catch(e){ updateSyncBadge(false); }
}
function pushRemote(force){
  if(!syncReady||!syncDoc||(applyingRemote&&!force)) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ syncDoc.set({payload:JSON.stringify({deals,meta}),updated:Date.now()}).catch(()=>{}); },400);
}
function updateSyncBadge(on){ const b=$('#syncBadge'); if(!b)return; b.style.display=FIREBASE_CONFIG?'':'none'; b.textContent=on?'● Live':'○ Offline'; b.style.color=on?'var(--green)':'var(--text-3)'; }

/* ════════ ENGINE ════════ */
const OPEN=()=>deals.filter(d=>STATUSES[d.status]&&STATUSES[d.status].open);
function proofScore(d){ return Math.round((d.proof||[]).filter(Boolean).length/PROOF_SIGNALS.length*10); }
function health(d){ return Math.round((d.belief||0)*3+proofScore(d)*5+(d.deserve||0)*2); }
function category(d){ if((d.deserve||0)>=7&&(d.status==='closing'||d.status==='advancing'))return 'commit'; if((d.deserve||0)>=5)return 'best'; return 'pipe'; }
const CAT_LABEL={commit:'Commit',best:'Best case',pipe:'Pipeline'};
function aud(d){ return (+d.arr||0)*(CURRENCIES[d.cur]?.rate||1); }
function stageDone(d){ return (d.journey||[]).filter(s=>s.done).length; }
function nextStage(d){ const i=stageDone(d); return i>=STAGES.length?null:STAGES[i]; }
function trend(d){ const p=(d.snapshots||[]).filter(s=>s.date<today).sort((a,b)=>a.date.localeCompare(b.date)); return p.length?health(d)-p[p.length-1].health:0; }
function recordSnapshots(){ if(RO)return; deals.forEach(d=>{ d.snapshots=d.snapshots||[]; const last=d.snapshots[d.snapshots.length-1]; if(!last||last.date!==today) d.snapshots.push({date:today,health:health(d)}); else last.health=health(d); if(d.snapshots.length>40) d.snapshots=d.snapshots.slice(-40); }); save(); }
function lastTouch(d){ // most recent activity = latest done stage date or latest snapshot
  let ds=(d.journey||[]).filter(s=>s.done&&s.date).map(s=>s.date); ds.sort();
  return ds.length?ds[ds.length-1]:null;
}
function ageDays(d){ const t=lastTouch(d); return t?Math.max(0,-daysUntil(t)):null; }
function needsAttention(d){
  const nd=nextDate(d); const open=(d.steps||[]).filter(s=>!s.done).length;
  if(open===0) return 'No next step defined';
  if(trend(d)<=-8) return 'Cooling off';
  if(!nd&&d.status!=='future') return 'No date scheduled';
  if((d.people||[]).length<2&&d.status!=='future'&&d.status!=='recovery') return 'Single-threaded';
  const a=ageDays(d); if(a!=null&&a>=45&&d.status!=='future') return 'Stalled '+a+' days';
  return null;
}
/* fiscal quarter (Salesforce-style FY starts Feb 1): Q2 = May–Jul */
function fiscalQ(iso){ const m=new Date(iso+'T00:00').getMonth(); if(m>=1&&m<=3)return 'Q1'; if(m>=4&&m<=6)return 'Q2'; if(m>=7&&m<=9)return 'Q3'; return 'Q4'; }
function quarterOf(d){ const dt=d.closeDate||(nextDate(d)?nextDate(d).date:null)||today; return fiscalQ(dt); }
const CURRENT_Q=fiscalQ(today);

/* ════════ MONEY (dual currency) ════════ */
const fmtA=a=>'A$'+Math.round(a).toLocaleString('en-US');
const fmtU=a=>'US$'+Math.round(a/AUD_PER_USD).toLocaleString('en-US');
function money(a){ return meta.displayMode==='USD'?fmtU(a):fmtA(a); }   // primary
const showBoth=()=>meta.displayMode==='both';
function secondary(a){ return fmtU(a); }                                 // shown only when 'both'

const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>'d'+Math.random().toString(36).slice(2,9);
function healthColor(h){ if(h>=70)return 'var(--green)'; if(h>=45)return 'var(--blue)'; if(h>=30)return 'var(--orange)'; return 'var(--gray)'; }
function ring(h,size){ const stroke=size>=44?4:3.2,r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-h/100),col=healthColor(h);
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--fill-2)" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/></svg><div class="ring-num" style="color:${col}">${h}</div></div>`; }
function trendHTML(d){ const t=trend(d);
  if(t>=3) return `<span class="trend up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg>${t}</span>`;
  if(t<=-3) return `<span class="trend down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>${Math.abs(t)}</span>`;
  return `<span class="trend flat">—</span>`; }
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_LONG=['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtShort(iso){ if(!iso)return''; const d=new Date(iso+'T00:00'); return MONTHS[d.getMonth()]+' '+d.getDate(); }
function daysUntil(iso){ if(!iso)return 9999; const d=new Date(iso+'T00:00'); return Math.round((d-new Date(new Date().toDateString()))/864e5); }
function nextDate(deal){ const f=(deal.dates||[]).filter(x=>x.date&&daysUntil(x.date)>=0).sort((a,b)=>a.date.localeCompare(b.date)); return f[0]||null; }
function relTime(ts){ if(!ts)return''; const s=Math.floor((Date.now()-ts)/1000); if(s<60)return'just now'; const m=Math.floor(s/60); if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h ago'; const dd=Math.floor(h/24); if(dd<7)return dd+'d ago'; const d=new Date(ts); return MONTHS[d.getMonth()]+' '+d.getDate(); }

function updateCov(){

  [['won',won],['lost',lost]].forEach(([st,items])=>{ if(!items.length)return; const m=STATUSES[st], sum=items.reduce((s,d)=>s+aud(d),0);
    html+=`<div class="group"><div class="group-head"><span class="group-dot" style="background:${m.color}"></span><span class="group-name">${m.label}</span><span class="group-count">${items.length}</span><span class="group-sum">${money(sum)}</span></div><div class="card-stack">${items.map(cardHTML).join('')}</div></div>`; });
  wrap.innerHTML=html;
  wrap.querySelectorAll('.deal-card').forEach(r=>r.addEventListener('click',()=>openDeal(r.dataset.id)));

function cardHTML(d){

  const stageLabel=done>=STAGES.length?'Won 🎉':(done?STAGES[done-1]+(done<STAGES.length?' → '+STAGES[done]:''):'New lead');
  const age=ageDays(d), stale=age!=null&&age>=30;
  return `<div class="deal-card" data-id="${d.id}">
    <div class="dc-top">
      <span class="dc-status" style="background:${col}"></span>
      <div class="dc-id">
        <div class="dc-name">${esc(d.name)||'Untitled'}<span class="qtag ${q===CURRENT_Q?'now':''}">${q}</span>${attn?`<span class="dc-attn" title="${esc(attn)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>`:''}</div>
        <div class="dc-meta">${esc(metaBits)||'—'}</div>
      </div>
      <div class="dc-money"><div class="dc-arr">${money(aud(d))}</div>${showBoth()?`<div class="dc-arr2">${secondary(aud(d))}</div>`:''}</div>
    </div>
    <div class="dc-stage"><div class="stage-bar">${segs}</div></div>
    <div class="dc-foot">
      <span class="dc-stage-label">${esc(stageLabel)}</span>
      <span class="dc-foot-right">
        ${(d.comments&&d.comments.length)?`<span class="dc-cmt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>${d.comments.length}</span>`:''}
        ${age!=null?`<span class="dc-age ${stale?'stale':''}">${age}d in stage</span>`:''}
        ${nd?`<span class="dc-next ${soon?'soon':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtShort(nd.date)}</span>`:''}
        ${trendHTML(d)}${ring(health(d),32)}
      </span>
    </div>
  </div>`;
}

/* ════════ CALENDAR ════════ */
function renderCalendar(){
  const ev=[]; OPEN().forEach(d=>(d.dates||[]).forEach(x=>{ if(x.date)ev.push({...x,deal:d}); }));
  ev.sort((a,b)=>a.date.localeCompare(b.date));
  const wrap=$('#agenda'); wrap.innerHTML='';
  if(!ev.length){ wrap.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>No dates yet. Open an account to add key dates.</p></div>`; return; }
  let curMonth='',card=null;
  ev.forEach(e=>{ const d=new Date(e.date+'T00:00'), mk=d.getFullYear()+'-'+d.getMonth();
    if(mk!==curMonth){ curMonth=mk; const block=document.createElement('div'); block.className='agenda-month'; block.innerHTML=`<div class="agenda-month-head">${MONTHS_LONG[d.getMonth()]} ${d.getFullYear()} · ${fiscalQ(e.date)}</div><div class="agenda-card"></div>`; wrap.appendChild(block); card=block.querySelector('.agenda-card'); }
    const soon=daysUntil(e.date)<=21&&daysUntil(e.date)>=0;
    const item=document.createElement('div'); item.className='agenda-item'; item.dataset.id=e.deal.id;
    item.innerHTML=`<div class="agenda-date ${soon?'soon':''}"><div class="d">${d.getDate()}</div><div class="m">${MONTHS[d.getMonth()]}</div></div><div class="agenda-body"><div class="agenda-label">${esc(e.label)}</div><div class="agenda-meta"><span class="dot" style="background:${STATUSES[e.deal.status].color}"></span>${esc(e.deal.name)} · ${STATUSES[e.deal.status].label}</div></div><div class="agenda-arr">${money(aud(e.deal))}</div>`;
    item.addEventListener('click',()=>openDeal(e.deal.id)); card.appendChild(item);
  });
}

/* ════════ FORECAST ════════ */
function renderForecast(){
  const open=OPEN();
  const total=open.reduce((s,d)=>s+aud(d),0);
  const commitD=open.filter(d=>category(d)==='commit'), bestD=open.filter(d=>category(d)==='best');
  const commit=commitD.reduce((s,d)=>s+aud(d),0), best=commit+bestD.reduce((s,d)=>s+aud(d),0);
  const s2=a=>showBoth()?`<div class="scen-sub2">${secondary(a)}</div>`:'';
  $('#scenGrid').innerHTML=`
    <div class="scen commit"><div class="scen-label">Commit</div><div class="scen-value">${money(commit)}</div>${s2(commit)}<div class="scen-note">${commitD.map(d=>esc(d.name)).join(', ')||'Nothing has earned commit yet'}</div></div>
    <div class="scen best"><div class="scen-label">Best case</div><div class="scen-value">${money(best)}</div>${s2(best)}<div class="scen-note">Commit + ${bestD.map(d=>esc(d.name)).join(', ')||'—'}</div></div>
    <div class="scen pipe"><div class="scen-label">Full pipeline</div><div class="scen-value" style="color:var(--text)">${money(total)}</div>${s2(total)}<div class="scen-note">All ${open.length} open accounts</div></div>`;
  const order=Object.keys(STATUSES).filter(k=>STATUSES[k].open).sort((a,b)=>STATUSES[a].order-STATUSES[b].order);
  const max=Math.max(1,...order.map(st=>open.filter(d=>d.status===st).reduce((s,d)=>s+aud(d),0)));
  let rows='';
  order.forEach(st=>{ const items=open.filter(d=>d.status===st); if(!items.length)return; const sum=items.reduce((s,d)=>s+aud(d),0);
    rows+=`<div class="bd-row"><div class="bd-name"><span class="dot" style="background:${STATUSES[st].color}"></span>${STATUSES[st].label}</div><div class="bd-track"><div class="bd-fill" style="width:${sum/max*100}%;background:${STATUSES[st].color}"></div></div><div class="bd-val">${money(sum)}</div></div>`; });
  $('#breakdown').innerHTML=`<h3>Pipeline by stage</h3>${rows}`;
  const below=open.filter(d=>category(d)==='pipe').sort((a,b)=>aud(b)-aud(a));
  const belowSum=below.reduce((s,d)=>s+aud(d),0);
  $('#belowbar').innerHTML=`<h3>Below the forecast bar</h3><div class="sub">${money(belowSum)} of pipeline hasn't earned its place yet — Deservedness under 7, or not in a closing stage. Strengthen the proof or requalify.</div>${below.map(d=>`<div class="below-item" data-id="${d.id}"><span class="dc-status" style="background:${STATUSES[d.status].color};position:static;margin:0"></span><span class="bi-name">${esc(d.name)}</span><span class="bi-why">Deservedness ${d.deserve}/10</span><span class="bi-arr">${money(aud(d))}</span></div>`).join('')||'<div class="sub">Everything currently clears the bar. 🎯</div>'}`;
  $('#belowbar').querySelectorAll('.below-item').forEach(n=>n.addEventListener('click',()=>openDeal(n.dataset.id)));
}

function paintStatusPill(d){ const m=STATUSES[d.status],p=$('#statusPill'); p.style.background=m.soft; p.style.color=m.color; p.innerHTML=`<span class="dot" style="background:${m.color}"></span>${m.label}${RO?'':`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`}`; p.style.cursor=RO?'default':'pointer'; }
function renderGrade(d){ const cb=$('#catBadge'); if(cb){ cb.className='fw-cat '+category(d); cb.textContent=CAT_LABEL[category(d)]; } const hr=$('#heroRing'); if(hr)hr.innerHTML=ring(health(d),56); const pv=$('#proofVal'); if(pv)pv.textContent=proofScore(d)+'/10'; const pf=$('#proofFill'); if(pf)pf.style.width=(proofScore(d)*10)+'%'; }

  const people=(d.people||[]).map((p,i)=>{ const sc=SENTI[p.sent]||SENTI.neutral; const roleOpts=Object.keys(ROLES).map(r=>`<option ${p.role===r?'selected':''}>${r}</option>`).join('');

  const steps=(d.steps||[]).map((s,i)=>`<div class="task ${s.done?'done':''}" data-i="${i}"><button class="task-check" data-act="toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button><textarea class="task-text" rows="1" data-act="edit" placeholder="Action…">${esc(s.text)}</textarea><button class="task-del" data-act="del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');
  const dates=(d.dates||[]).map((x,i)=>`<div class="kdate" data-i="${i}"><input type="date" value="${x.date||''}" data-act="date"><input class="kdate-label" value="${esc(x.label)}" placeholder="What happens…" data-act="dlabel"><button class="kdate-del" data-act="ddel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');
  const proof=PROOF_SIGNALS.map((sig,i)=>`<div class="proof-item ${d.proof[i]?'on':''}" data-i="${i}"><span class="proof-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span class="pl">${sig}</span></div>`).join('');
  const audLine=showAud?`≈ ${fmtA(aud(d))} AUD`:(showBoth()?secondary(aud(d)):'');

  $('#panelBody').innerHTML=`
    <input class="panel-name" id="fName" value="${esc(d.name)}" placeholder="Account name">
    <div class="hero-grid">
      <div class="hero-cell"><div class="hk">Pipeline (ARR)</div><div class="hero-arr-row"><input class="hero-arr-input" id="fArr" value="${esc(d.arr)}" inputmode="numeric"><select class="cur-select" id="fCur">${curOpts}</select></div><div class="hero-aud" id="audHint" style="${audLine?'':'display:none'}">${audLine}</div></div>
      <div class="hero-cell"><div class="hk">Target / next</div><div class="hero-date">${esc(d.closeLabel)||'—'}</div></div>

  if(RO) applyReadOnly(); else wirePanel(d);

}
function wireComments(d){
  const send=$('#cmtSend'), input=$('#cmtInput'), nameI=$('#cmtName'); if(!send)return;
  autosize(input); input.addEventListener('input',()=>autosize(input));
  const doSend=()=>{ const t=input.value.trim(); if(!t)return; userName=(nameI.value.trim()||'Anon'); try{localStorage.setItem('pcc_user',userName);}catch(e){}
    d.comments=d.comments||[]; d.comments.push({id:uid(),author:userName,text:t,ts:Date.now()}); save(); renderPanel(); renderDeals(); };
  send.addEventListener('click',doSend);
  input.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter')doSend(); });
}
function applyReadOnly(){
  const b=$('#panelBody');
  b.querySelectorAll('input,textarea,select').forEach(e=>{ if(!e.classList.contains('keep-enabled')) e.disabled=true; });
  b.querySelectorAll('.add-task').forEach(e=>e.style.display='none');
  b.querySelectorAll('.proof-item,.step,.task-check,.task-del,.kdate-del,.person-del,.person-sent').forEach(e=>e.style.pointerEvents='none');
  $('#deleteBtn').style.display='none';
  ['fWhy','fCost','fThreats','fNotes'].forEach(id=>{ const e=$('#'+id); if(e)autosize(e); });
  b.querySelectorAll('.task-text').forEach(autosize);
}
function autosize(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

function wirePanel(d){
  $('#deleteBtn').style.display='';
  const bind=(id,key,num)=>{ const el=$('#'+id); if(!el)return; el.addEventListener('input',()=>{ d[key]=num?(parseFloat(el.value.replace(/[^0-9.]/g,''))||0):el.value; save(); renderDeals(); }); };
  bind('fName','name'); bind('fContact','contact'); bind('fRole','role'); bind('fCrm','crm'); bind('fUsers','users',true);
  bind('fType','type'); bind('fLoc','location'); bind('fClose','closeLabel'); bind('fBlocker','blocker'); bind('fRisk','risk'); bind('fLast','lastActivity'); bind('fNotes','notes');
  bind('fWhy','whyNow'); bind('fCost','costInaction'); bind('fThreats','threats');
  ['fWhy','fCost','fThreats','fNotes'].forEach(id=>{ const el=$('#'+id); if(el){autosize(el);el.addEventListener('input',()=>autosize(el));} });
  $('#fCloseDate').addEventListener('input',e=>{ d.closeDate=e.target.value; save(); renderDeals(); });

  const arr=$('#fArr'),cur=$('#fCur'),audHint=$('#audHint');
  const refreshAud=()=>{ const line=(d.cur&&d.cur!=='AUD')?'≈ '+fmtA(aud(d))+' AUD':(showBoth()?secondary(aud(d)):''); audHint.style.display=line?'':'none'; audHint.textContent=line; };
  arr.addEventListener('input',()=>{ d.arr=parseFloat(arr.value.replace(/[^0-9.]/g,''))||0; save(); refreshAud(); renderDeals(); });
  cur.addEventListener('change',()=>{ d.cur=cur.value; save(); refreshAud(); renderDeals(); });

  const bSl=$('#fBelief'),dSl=$('#fDeserve');
  bSl.addEventListener('input',()=>{ d.belief=+bSl.value; $('#beliefVal').textContent=d.belief+'/10'; save(); renderGrade(d); renderDeals(); });
  dSl.addEventListener('input',()=>{ d.deserve=+dSl.value; $('#deserveVal').textContent=d.deserve+'/10'; save(); renderGrade(d); renderDeals(); });

  $('#proofList').querySelectorAll('.proof-item').forEach(p=>p.addEventListener('click',()=>{ const i=+p.dataset.i; d.proof[i]=!d.proof[i]; p.classList.toggle('on',d.proof[i]); save(); renderGrade(d); renderDeals(); }));

  $('#stepper').querySelectorAll('.step').forEach(st=>st.addEventListener('click',()=>{
    const i=+st.dataset.i; const wasOnlyThis=(stageDone(d)===i+1); const upto=wasOnlyThis?i:i+1;
    d.journey=STAGES.map((_,j)=>{ const ex=d.journey[j]||{}; const done=j<upto; return {done,date:done?(ex.date||today):''}; });
    save(); renderPanel(); renderDeals();
  }));

  $('#peopleList').querySelectorAll('.person').forEach(p=>{ const i=+p.dataset.i;
    p.querySelector('[data-act=pname]').addEventListener('input',e=>{ d.people[i].name=e.target.value; save(); renderDeals(); });
    p.querySelector('[data-act=prole]').addEventListener('change',e=>{ d.people[i].role=e.target.value; save(); });
    p.querySelector('[data-act=sent]').addEventListener('click',()=>{ d.people[i].sent=SENTI_NEXT[d.people[i].sent||'neutral']; save(); renderPanel(); });
    p.querySelector('[data-act=pdel]').addEventListener('click',()=>{ d.people.splice(i,1); save(); renderPanel(); renderDeals(); }); });
  $('#addPerson').addEventListener('click',()=>{ d.people=d.people||[]; d.people.push({name:'',role:'Influencer',sent:'neutral'}); save(); renderPanel(); renderDeals(); const last=$('#peopleList').querySelector('.person:last-child .person-name'); if(last)last.focus(); });

  $('#taskList').querySelectorAll('.task').forEach(t=>{ const i=+t.dataset.i;
    t.querySelector('[data-act=toggle]').addEventListener('click',()=>{ d.steps[i].done=!d.steps[i].done; save(); renderPanel(); renderDeals(); });
    const ta=t.querySelector('[data-act=edit]'); autosize(ta); ta.addEventListener('input',()=>{ d.steps[i].text=ta.value; autosize(ta); save(); });
    t.querySelector('[data-act=del]').addEventListener('click',()=>{ d.steps.splice(i,1); save(); renderPanel(); renderDeals(); }); });
  $('#addStep').addEventListener('click',()=>{ d.steps=d.steps||[]; d.steps.push({text:'',done:false}); save(); renderPanel(); renderDeals(); const last=$('#taskList').querySelector('.task:last-child textarea'); if(last)last.focus(); });

  $('#dateList').querySelectorAll('.kdate').forEach(k=>{ const i=+k.dataset.i;
    k.querySelector('[data-act=date]').addEventListener('input',e=>{ d.dates[i].date=e.target.value; save(); renderDeals(); });
    k.querySelector('[data-act=dlabel]').addEventListener('input',e=>{ d.dates[i].label=e.target.value; save(); });
    k.querySelector('[data-act=ddel]').addEventListener('click',()=>{ d.dates.splice(i,1); save(); renderPanel(); renderDeals(); }); });
  $('#addDate').addEventListener('click',()=>{ d.dates=d.dates||[]; d.dates.push({date:'',label:''}); save(); renderPanel(); renderDeals(); });
}

/* ════════ EVENTS ════════ */
$('#seg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  $('#seg').querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); $('#view-'+b.dataset.view).classList.add('active');
  if(b.dataset.view==='calendar')renderCalendar(); if(b.dataset.view==='forecast')renderForecast(); });
$('#statusPill').addEventListener('click',()=>{ if(!RO)$('#statusMenu').classList.toggle('open'); });
document.addEventListener('click',e=>{ if(!e.target.closest('.status-select'))$('#statusMenu').classList.remove('open'); });
$('#panelClose').addEventListener('click',closePanel); $('#scrim').addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closePanel(); });
$('#deleteBtn').addEventListener('click',()=>{ const d=deal(); if(!d)return; if(confirm('Delete '+(d.name||'this account')+'? This can’t be undone.')){ deals=deals.filter(x=>x.id!==openId); save(); closePanel(); renderDeals(); toast('Account deleted'); } });
$('#addBtn').addEventListener('click',()=>{ const d={id:uid(),name:'',arr:0,cur:'AUD',status:'engaged',belief:5,deserve:5,proof:proofFrom(0),journey:journeyTo(0),closeDate:'',people:[],whyNow:'',costInaction:'',threats:'',crm:'',users:0,type:'',location:'',contact:'',role:'',closeLabel:'',blocker:'',risk:'',lastActivity:'',steps:[],dates:[],notes:'',snapshots:[]}; deals.push(d); save(); renderDeals(); openDeal(d.id); setTimeout(()=>{ const n=$('#fName'); if(n)n.focus(); },420); });
$('#curBtn').addEventListener('click',()=>{ const o={both:'AUD',AUD:'USD',USD:'both'}; meta.displayMode=o[meta.displayMode]||'both'; save(); applyChrome(); renderActive(); if(openId)renderPanel(); });
$('#mgrBtn').addEventListener('click',()=>{ RO=!RO; applyChrome(); closePanel(); renderActive(); toast(RO?'Manager view — read only':'Back to editing'); });
$('#shareBtn').addEventListener('click',async()=>{ try{ const data=btoa(unescape(encodeURIComponent(JSON.stringify({deals,meta})))); const url=location.origin+location.pathname+'#d='+data+(RO?'&m=1':''); await navigator.clipboard.writeText(url); toast(RO?'Manager (read-only) link copied':'Share link copied to clipboard'); }catch(e){ toast('Couldn’t copy — try again'); } });
let toastT;
function toast(msg){ const t=$('#toast'); t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${msg}`; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400); }

/* ════════ INIT ════════ */
loadState(); recordSnapshots(); applyChrome(); renderDeals(); initSync();
</script>
</body>
</html>
